{% extends 'base.html' %}

{% block title %}Вход - Russian Nuclear Society{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Вход</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" name="email" required>
                            <label for="email">Почта</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" placeholder="Пароль" name="password" required>
                            <label for="password">Пароль</label>
                        </div>
                        <button class="btn btn-primary w-100 py-2" type="submit">Войти</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{% url 'register' %}">Нет аккаунта? Зарегистрируйтесь</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
