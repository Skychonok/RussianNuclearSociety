{% extends 'main/base.html' %}

{% block title %}Регистрация - Российское ядерное сообщество{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title text-center">Регистрация</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                            <label for="email">Почта</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Имя" required>
                            <label for="first_name">Имя</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Фамилия" required>
                            <label for="last_name">Фамилия</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Пароль" required>
                            <label for="password">Пароль</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Подтвердить пароль" required>
                            <label for="password_confirm">Подтвердить пароль</label>
                        </div>
                        <button class="btn btn-primary w-100 py-2" type="submit">Зарегистрироваться</button>
                    </form>
                    <div class="text-center mt-3">
                        <p>Уже есть аккаунт? <a href="{% url 'main:login' %}">Войти</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
