{% extends 'base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">Восстановление пароля</h2>

                    <form method="post">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="email" name="email" class="form-control" placeholder="Email" required>
                            <label>Email</label>
                        </div>

                        <button class="btn btn-primary w-100">Отправить ссылку</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="{% url 'main:login' %}">Назад к входу</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
